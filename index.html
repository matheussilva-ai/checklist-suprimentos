<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1A2332">
<title>Recursos Clínicos – Genial Care</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--teal:#00B4A2;--teal-dk:#008F80;--teal-lt:#E6F8F6;--dark:#1A2332;--mid:#3D5166;--light:#8499AE;--bg:#F4F7F9;--white:#fff;--ok:#2ECC71;--ok-bg:#E8FAF0;--ok-dk:#1A7340;--nok:#E74C3C;--nok-bg:#FDECEA;--r:14px;--sh:0 2px 16px rgba(0,0,0,.07)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:"DM Sans",sans-serif;background:var(--bg);color:var(--dark);min-height:100vh;overscroll-behavior:none}
.screen{display:none;flex-direction:column;min-height:100vh}.screen.active{display:flex}
header{background:var(--dark);padding:14px 20px;position:sticky;top:0;z-index:100;box-shadow:0 2px 20px rgba(0,0,0,.2);display:flex;align-items:center;justify-content:space-between;gap:12px}
.logo img{height:28px;width:auto}
.hdr-r{display:flex;align-items:center;gap:10px}
.prog-wrap{display:flex;align-items:center;gap:6px}
.prog-bar{width:70px;height:5px;background:rgba(255,255,255,.12);border-radius:99px;overflow:hidden}
.prog-fill{height:100%;background:var(--teal);border-radius:99px;transition:width .4s}
.prog-pct{font-size:.72rem;color:var(--light)}
.chip{background:rgba(0,180,162,.15);border:1px solid rgba(0,180,162,.3);border-radius:99px;padding:4px 10px;font-size:.72rem;color:var(--teal);font-weight:500;white-space:nowrap;max-width:110px;overflow:hidden;text-overflow:ellipsis}
/* WELCOME */
.wel{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;gap:28px}
.wel-logo img{height:48px}
.wel-title{font-family:"Syne",sans-serif;font-size:1.3rem;font-weight:700;text-align:center}
.wel-sub{font-size:.85rem;color:var(--light);text-align:center;margin-top:4px}
.who-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:360px}
.who-btn{background:var(--white);border:2px solid #DDE4EA;border-radius:var(--r);padding:16px 12px;text-align:center;cursor:pointer;font-family:"Syne",sans-serif;font-weight:600;font-size:.88rem;color:var(--mid);transition:all .15s;box-shadow:var(--sh)}
.who-btn.sel{background:var(--dark);color:var(--white);border-color:var(--dark)}
.who-ini{width:42px;height:42px;border-radius:50%;background:var(--bg);margin:0 auto 8px;display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:800;color:var(--teal);font-family:"Syne",sans-serif}
.who-btn.sel .who-ini{background:rgba(0,180,162,.2)}
.start-btn{width:100%;max-width:360px;background:var(--teal);color:#fff;border:none;border-radius:var(--r);padding:16px;font-size:1rem;font-weight:600;font-family:"Syne",sans-serif;cursor:pointer;box-shadow:0 4px 16px rgba(0,180,162,.3);transition:background .2s}
.start-btn:disabled{background:#B0C4CC;box-shadow:none}
.wel-date{font-size:.8rem;color:var(--teal);font-weight:600;margin-top:8px;
  background:var(--teal-lt);padding:4px 14px;border-radius:99px;text-align:center}
.wel-divider{width:48px;height:3px;background:var(--teal);border-radius:99px;margin:4px auto}
/* SELECTOR */
.sel-body{flex:1;padding:20px;display:flex;flex-direction:column;gap:16px;overflow-y:auto}
.slbl{font-family:"Syne",sans-serif;font-weight:700;font-size:.7rem;color:var(--light);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.clinics{display:flex;flex-direction:column;gap:8px}
.cbtn{background:var(--white);border:2px solid #DDE4EA;border-radius:var(--r);padding:14px 16px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:12px;box-shadow:var(--sh)}
.cbtn .ci{font-size:1.4rem;flex-shrink:0}.cbtn .cn{font-family:"Syne",sans-serif;font-weight:600;font-size:.9rem;color:var(--dark)}.cbtn .cs{font-size:.72rem;color:var(--light);margin-top:2px}.cbtn .ca{color:var(--light);margin-left:auto}
.cbtn.sel{border-color:var(--teal);background:var(--teal-lt)}
.rooms-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.rbtn-refresh{background:var(--teal-lt);border:1px solid var(--teal);color:var(--teal-dk);border-radius:99px;padding:4px 12px;font-size:.72rem;font-weight:600;cursor:pointer}
.rooms-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.rbtn{background:var(--white);border:2px solid #DDE4EA;border-radius:10px;padding:12px 6px;cursor:pointer;text-align:center;transition:all .15s;box-shadow:var(--sh);position:relative}
.rbtn .rn{font-family:"Syne",sans-serif;font-weight:700;font-size:.85rem;color:var(--dark)}.rbtn .rt{font-size:.62rem;color:var(--light);margin-top:2px}
.rbtn.is-r{border-color:#FFD0BC;background:#FFF5F0}.rbtn.is-r .rn{color:#C0440F}
.rbtn.done{border-color:var(--ok);background:var(--ok-bg)}.rbtn.done .rn{color:var(--ok-dk)}
.dbadge{position:absolute;top:-7px;right:-4px;background:var(--ok);color:#fff;border-radius:99px;font-size:.52rem;font-weight:700;padding:2px 5px;white-space:nowrap;max-width:82px;overflow:hidden;text-overflow:ellipsis}
/* CHECKLIST */
.ck-sub{background:var(--dark);padding:10px 20px 14px;border-bottom:1px solid rgba(255,255,255,.06)}
.rbanner{display:flex;align-items:center;gap:10px;margin-top:10px;padding:10px 14px;border-radius:10px}
.rbanner.p{background:rgba(0,180,162,.12)}.rbanner.is{background:rgba(255,107,53,.12)}
.rb-ico{font-size:1.3rem}.rb-ttl{font-family:"Syne",sans-serif;font-weight:700;font-size:.85rem;color:#fff}.rb-sub{font-size:.7rem;color:var(--light)}
.ftabs{display:flex;gap:6px;padding:12px 20px 0;overflow-x:auto;scrollbar-width:none}.ftabs::-webkit-scrollbar{display:none}
.ft{flex-shrink:0;padding:6px 14px;border-radius:99px;font-size:.75rem;font-weight:500;border:1.5px solid #DDE4EA;cursor:pointer;background:var(--white);color:var(--mid);transition:all .15s}
.ft.active{background:var(--dark);color:#fff;border-color:var(--dark)}.ft.ok.active{background:var(--ok);border-color:var(--ok)}.ft.nok.active{background:var(--nok);border-color:var(--nok)}
.ck-body{flex:1;padding:12px 16px 148px;display:flex;flex-direction:column;gap:8px;overflow-y:auto}
.glbl{font-family:"Syne",sans-serif;font-weight:700;font-size:.68rem;color:var(--light);text-transform:uppercase;letter-spacing:.08em;padding:4px 0 2px}
.icard{background:var(--white);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;border:2px solid transparent;transition:border-color .15s,background .15s}
.icard.c-ok{border-color:var(--ok);background:var(--ok-bg)}.icard.c-nok{border-color:var(--nok);background:var(--nok-bg)}
.imain{display:flex;align-items:stretch;min-height:88px}
.ithumb{width:80px;min-width:80px;background:#F0F4F8;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.ithumb .emoji{font-size:2rem}.ithumb img{display:none;position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .3s}.ithumb img.show{display:block;opacity:1}
.ibody{flex:1;padding:11px 12px;display:flex;flex-direction:column;justify-content:center;gap:4px}
.iname{font-family:"Syne",sans-serif;font-weight:600;font-size:.88rem;line-height:1.3;color:var(--dark)}
.imeta{display:flex;flex-wrap:wrap;gap:5px;align-items:center}
.iqty{font-size:.7rem;color:var(--teal-dk);font-weight:500;background:var(--teal-lt);padding:2px 7px;border-radius:99px}
.icat{font-size:.68rem;color:var(--mid);background:var(--bg);padding:2px 7px;border-radius:99px}
.iid{font-size:.65rem;color:var(--light)}
.iacts{display:flex;flex-direction:column;width:72px;min-width:72px;border-left:1px solid #F0F4F7}
.iact{flex:1;border:none;cursor:pointer;font-size:1.5rem;font-weight:700;display:flex;align-items:center;justify-content:center;background:transparent;transition:background .12s;min-height:44px}
.iact.ok{color:var(--ok)}.iact.nok{color:var(--nok);border-top:1px solid #F0F4F7}
.iact.ok.sel{background:var(--ok);color:#fff}.iact.nok.sel{background:var(--nok);color:#fff}
.ilink{display:block;text-align:center;padding:7px;font-size:.68rem;color:var(--teal);background:var(--teal-lt);text-decoration:none;font-weight:500;border-top:1px solid #D0F0EC}
/* BOTTOM */
.btm{position:fixed;bottom:0;left:0;right:0;z-index:99;background:var(--white);border-top:1px solid #E8EDF2;box-shadow:0 -4px 20px rgba(0,0,0,.08)}
.stats{display:flex;border-bottom:1px solid #F0F4F7}
.stat{flex:1;padding:8px 4px;text-align:center}.stat:not(:last-child){border-right:1px solid #F0F4F7}
.stat .n{font-family:"Syne",sans-serif;font-weight:800;font-size:1.3rem}.stat.ok .n{color:var(--ok)}.stat.nok .n{color:var(--nok)}
.stat .l{font-size:.6rem;color:var(--light);font-weight:500;text-transform:uppercase;letter-spacing:.04em}
.acts{display:flex;gap:8px;padding:10px 16px}
.bsend{flex:1;background:var(--teal);color:#fff;border:none;border-radius:10px;padding:13px;font-size:.88rem;font-weight:600;font-family:"Syne",sans-serif;cursor:pointer;transition:background .2s}
.bsend:disabled{background:#B0C4CC}.bsend.sending{background:#F39C12}.bsend.sent{background:var(--ok-dk)}
.bsm{background:var(--bg);border:1.5px solid #DDE4EA;border-radius:10px;padding:13px 14px;font-size:.8rem;color:var(--mid);cursor:pointer;font-weight:500;white-space:nowrap}
/* TOAST */
.toast{position:fixed;bottom:140px;left:50%;transform:translateX(-50%);background:var(--dark);color:#fff;border-radius:99px;padding:10px 20px;font-size:.82rem;font-weight:500;box-shadow:0 4px 20px rgba(0,0,0,.25);z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.empty{text-align:center;padding:48px 20px;color:var(--light)}.empty-ico{font-size:2.5rem;margin-bottom:10px}

/* OBSERVAÇÃO ITEM */
.inote-wrap{padding:6px 12px 10px;border-top:1px solid #F0F4F7;background:rgba(231,76,60,.04)}
.inote-wrap.ok-note{background:rgba(46,204,113,.04);border-top:1px solid #D4F5E2}
.inote-input{width:100%;border:1.5px solid #DDE4EA;border-radius:8px;padding:7px 10px;font-size:.78rem;font-family:"DM Sans",sans-serif;color:#1A2332;background:#fff;resize:none;outline:none;transition:border-color .15s}
.inote-input:focus{border-color:var(--teal)}
.inote-label{font-size:.68rem;color:var(--light);margin-bottom:4px;display:block}
/* OBSERVAÇÃO DA SALA */
.sala-obs{margin:4px 0 8px;background:#fff;border-radius:var(--r);box-shadow:var(--sh);padding:14px 16px}
.sala-obs-lbl{font-family:"Syne",sans-serif;font-weight:700;font-size:.75rem;color:var(--mid);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.sala-obs-ta{width:100%;border:1.5px solid #DDE4EA;border-radius:10px;padding:10px 12px;font-size:.82rem;font-family:"DM Sans",sans-serif;color:#1A2332;resize:none;outline:none;min-height:72px;transition:border-color .15s}
.sala-obs-ta:focus{border-color:var(--teal)}

/* última ronda na clínica */
.c-last{font-size:.65rem;color:var(--teal-dk);margin-top:3px;font-style:italic}
/* badge de sala com data (ronda anterior) */
.dbadge.old{background:#8499AE}

@media (prefers-color-scheme: dark) {
  :root {
    --bg:#111820;
    --white:#1C2A38;
    --dark:#E8F0F7;
    --mid:#A8BDD0;
    --light:#6A8499;
    --teal:#00C9B4;
    --teal-lt:#0D2A28;
    --teal-dk:#00E5CC;
    --ok:#2ECC71;
    --ok-bg:#0D2A1A;
    --ok-dk:#4AE085;
    --nok:#E74C3C;
    --nok-bg:#2A0D0D;
    --sh:0 2px 16px rgba(0,0,0,.3);
  }
  body { background:var(--bg); color:var(--dark); }
  header { background:#0D1520; box-shadow:0 2px 20px rgba(0,0,0,.5); }
  .who-btn { background:#1C2A38; border-color:#2A3D52; color:var(--mid); }
  .who-btn.sel { background:#0D2A28; color:var(--teal); border-color:var(--teal); }
  .who-ini { background:#111820; }
  .cbtn { background:#1C2A38; border-color:#2A3D52; }
  .cbtn.sel { background:#0D2A28; border-color:var(--teal); }
  .rbtn { background:#1C2A38; border-color:#2A3D52; }
  .rbtn.done { background:#0D2A1A; border-color:var(--ok); }
  .rbtn.is-r { background:#2A1A0D; border-color:#CC6633; }
  .icard { background:#1C2A38; }
  .icard.c-ok { background:var(--ok-bg); }
  .icard.c-nok { background:var(--nok-bg); }
  .ithumb { background:#111820; }
  .ftabs .ft { background:#1C2A38; border-color:#2A3D52; color:var(--mid); }
  .btm { background:#0D1520; border-top:1px solid #2A3D52; }
  .stats { border-bottom:1px solid #2A3D52; }
  .stat:not(:last-child) { border-right:1px solid #2A3D52; }
  .iacts { border-left:1px solid #2A3D52; }
  .iact.nok { border-top:1px solid #2A3D52; }
  .sala-obs { background:#1C2A38; }
  .sala-obs-ta { background:#111820; border-color:#2A3D52; color:var(--dark); }
  .inote-input { background:#111820; border-color:#2A3D52; color:var(--dark); }
  .inote-wrap { background:rgba(231,76,60,.08); border-top:1px solid #2A3D52; }
  .inote-wrap.ok-note { background:rgba(46,204,113,.08); }
  .ck-sub { background:#0D1520; }
  .bsm { background:#1C2A38; border-color:#2A3D52; color:var(--mid); }
  .wel-date { background:rgba(0,180,162,.15); }
  .clinics-prog-wrap { background:#1C2A38; }
}

/* Progresso da clínica na tela de seleção */
.clinics-prog-wrap{margin-top:14px;background:var(--white);border-radius:var(--r);
  padding:14px 16px;box-shadow:var(--sh)}
.clinics-prog-title{font-family:"Syne",sans-serif;font-weight:700;font-size:.72rem;
  color:var(--light);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.clinic-prog-row{margin-bottom:8px}
.clinic-prog-row:last-child{margin-bottom:0}
.clinic-prog-info{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.clinic-prog-name{font-size:.8rem;font-weight:500;color:var(--dark)}
.clinic-prog-nums{font-size:.72rem;color:var(--light)}
.clinic-prog-bar{height:6px;background:var(--bg);border-radius:99px;overflow:hidden}
.clinic-prog-fill{height:100%;border-radius:99px;transition:width .5s;background:var(--teal)}
.clinic-prog-fill.complete{background:var(--ok)}
.clinic-prog-fill.low{background:var(--nok)}
</style>
</head>

// ── IMAGENS ──────────────────────────────────────────────
const IMG_CACHE = {};
function mlbId(url) {
  if (!url) return null;
  var m = url.match(/MLB[-]?(\d{7,12})/i);
  return m ? "MLB" + m[1] : null;
}
async function loadImg(item, img, ph) {
  if (!img) return;
  var c = IMG_CACHE[item.id];
  if (c === "error") return;
  if (c) { doImg(img, ph, c); return; }
  var url = item.link;
  if (!url || url.indexOf("encomenda") >= 0) return;
  var mid = mlbId(url);
  if (mid) {
    try {
      var r = await fetch("https://api.mercadolibre.com/items/" + mid + "?attributes=thumbnail", {signal: AbortSignal.timeout(6000)});
      if (r.ok) {
        var d = await r.json();
        var s = (d.thumbnail || "").replace(/-[A-Z]\.jpg/, "-O.jpg").replace("http://", "https://");
        if (s) { IMG_CACHE[item.id] = s; doImg(img, ph, s); return; }
      }
    } catch(e) {}
  }
  if (!mid && url && url.indexOf("issam") < 0) {
    try {
      var r2 = await fetch("https://api.allorigins.win/get?url=" + encodeURIComponent(url), {signal: AbortSignal.timeout(8000)});
      if (r2.ok) {
        var d2 = await r2.json();
        var m2 = d2.contents.match(/og:image[^>]*content=["']([^"']+)["']|content=["']([^"']+)["'][^>]*og:image/i);
        var s2 = m2 && (m2[1] || m2[2]);
        if (s2) { IMG_CACHE[item.id] = s2; doImg(img, ph, s2); return; }
      }
    } catch(e) {}
  }
  IMG_CACHE[item.id] = "error";
}
function doImg(img, ph, src) {
  img.src = src; img.style.display = "block";
  img.onload  = function() { img.classList.add("show"); if (ph) ph.style.display = "none"; };
  img.onerror = function() { img.style.display = "none"; };
}

var WHO = null, CLINIC = null, ROOM = null, FILTER = "all";
var checks = {}, sent = {}, shared = {}, notes = {}, roomObs = {}, lastRonda = {};
function sk(c,r,i){ return c+"_"+r+"_"+i; }
function rk(c,r)  { return c+"_"+r; }
function today()  { return new Date().toLocaleDateString("pt-BR"); }
function gc(id)   { return checks[sk(CLINIC.id, ROOM.id, id)] || null; }
function gn(id)   { return notes[sk(CLINIC.id, ROOM.id, id)] || ""; }
function sn(id,v) { var k=sk(CLINIC.id,ROOM.id,id); if(v) notes[k]=v; else delete notes[k]; save(); }
function getRoomObs() { return roomObs[rk(CLINIC.id,ROOM.id)] || ""; }
function setRoomObs(v){ var k=rk(CLINIC.id,ROOM.id); if(v) roomObs[k]=v; else delete roomObs[k]; }
function sc(id,v) {
  var k = sk(CLINIC.id, ROOM.id, id);
  if (checks[k] === v) delete checks[k]; else checks[k] = v;
  save(); renderCk(); updateStats();
}
function doneInfo(k) {
  var l = sent[k];   if (l && l.date === today()) return l;
  var s = shared[k]; if (s && s.date === today()) return s;
  return null;
}
function save() {
  try { localStorage.setItem("gc_c",  JSON.stringify(checks));  } catch(e) {}
  try { localStorage.setItem("gc_s",  JSON.stringify(sent));    } catch(e) {}
  try { localStorage.setItem("gc_n",  JSON.stringify(notes));   } catch(e) {}
  try { localStorage.setItem("gc_ro", JSON.stringify(roomObs)); } catch(e) {}
}
function load() {
  try { var d=localStorage.getItem("gc_c");  if(d) checks=JSON.parse(d);  } catch(e) {}
  try { var d=localStorage.getItem("gc_s");  if(d) sent=JSON.parse(d);    } catch(e) {}
  try { var d=localStorage.getItem("gc_n");  if(d) notes=JSON.parse(d);   } catch(e) {}
  try { var d=localStorage.getItem("gc_ro"); if(d) roomObs=JSON.parse(d); } catch(e) {}
}

var CORDER = ["morumbi16","morumbi12","morumbi14","tatuape","pinheiros","paraiso","alphaville3","alphaville9","analia","santana"];
function buildClinics() {
  var g = document.getElementById("clinicsGrid"), html = "";
  for (var i=0; i<CORDER.length; i++) {
    var c = null;
    for (var j=0; j<CLINICS.length; j++) { if (CLINICS[j].id === CORDER[i]) { c=CLINICS[j]; break; } }
    if (!c) continue;
    var isN=0; for (var j=0;j<c.rooms.length;j++) if(c.rooms[j].type==="IS") isN++;
    html += "<button class=\"cbtn\" id=\"cb_"+c.id+"\" onclick=\"pickClinic(this,'"+c.id+"')\">";
    html += "<div class=\"ci\">\uD83C\uDFE5</div>";
    var lr = lastRonda[c.id];
    var lrTxt = lr ? "<div class=\"c-last\">\u23F1 \u00daltima ronda: " + lr.date + "</div>" : "";
    html += "<div style=\"flex:1\"><div class=\"cn\">"+c.name+"</div><div class=\"cs\">"+(c.rooms.length-isN)+" padr\u00e3o \u00b7 "+isN+" IS</div>"+lrTxt+"</div>";
    html += "<div class=\"ca\">\u203a</div></button>";
  }
  document.getElementById("clinicsGrid").innerHTML = html;
}
function pickClinic(btn, id) {
  var bs = document.querySelectorAll(".cbtn"); for(var i=0;i<bs.length;i++) bs[i].classList.remove("sel");
  btn.classList.add("sel");
  for (var i=0;i<CLINICS.length;i++) { if(CLINICS[i].id===id){CLINIC=CLINICS[i];break;} }
  buildRooms();
  buildClinicProgress();
  document.getElementById("roomsSec").style.display = "block";
  document.getElementById("clinicProgWrap").style.display = "block";
  document.getElementById("roomsLbl").textContent = "Salas \u2013 " + CLINIC.name;
  setTimeout(function() { document.getElementById("clinicProgWrap").scrollIntoView({behavior:"smooth"}); }, 100);
}

function buildClinicProgress() {
  if (!CLINIC) return;
  var wrap = document.getElementById("clinicProgBars");
  if (!wrap) return;
  var rooms = CLINIC.rooms;
  var total = rooms.length;
  var feitas = 0;
  var html = "";
  for (var i=0; i<rooms.length; i++) {
    var k = rk(CLINIC.id, rooms[i].id);
    var d = doneInfo(k);
    if (d) feitas++;
  }
  // Barra geral da clínica
  var pct = total > 0 ? Math.round(feitas/total*100) : 0;
  var fillCls = pct === 100 ? "clinic-prog-fill complete" : pct < 30 ? "clinic-prog-fill low" : "clinic-prog-fill";
  html += "<div class=\"clinic-prog-row\">";
  html += "<div class=\"clinic-prog-info\">";
  html += "<span class=\"clinic-prog-name\">" + CLINIC.name + "</span>";
  html += "<span class=\"clinic-prog-nums\">" + feitas + " / " + total + " salas</span>";
  html += "</div>";
  html += "<div class=\"clinic-prog-bar\">";
  html += "<div class=\"" + fillCls + "\" style=\"width:" + pct + "%\"></div>";
  html += "</div></div>";
  // Separar padrão e IS
  var padrao = rooms.filter(function(r){return r.type!=="IS";});
  var is = rooms.filter(function(r){return r.type==="IS";});
  if (padrao.length > 0) {
    var feitasPad = padrao.filter(function(r){return !!doneInfo(rk(CLINIC.id,r.id));}).length;
    var pctPad = Math.round(feitasPad/padrao.length*100);
    var fillPad = pctPad===100?"clinic-prog-fill complete":pctPad<30?"clinic-prog-fill low":"clinic-prog-fill";
    html += "<div class=\"clinic-prog-row\">";
    html += "<div class=\"clinic-prog-info\">";
    html += "<span class=\"clinic-prog-name\" style=\"font-size:.72rem;color:var(--mid)\">\u2B1C Salas Padr\u00e3o</span>";
    html += "<span class=\"clinic-prog-nums\">" + feitasPad + "/" + padrao.length + "</span>";
    html += "</div>";
    html += "<div class=\"clinic-prog-bar\" style=\"height:4px\">";
    html += "<div class=\"" + fillPad + "\" style=\"width:" + pctPad + "%\"></div>";
    html += "</div></div>";
  }
  if (is.length > 0) {
    var feitasIS = is.filter(function(r){return !!doneInfo(rk(CLINIC.id,r.id));}).length;
    var pctIS = Math.round(feitasIS/is.length*100);
    var fillIS = pctIS===100?"clinic-prog-fill complete":pctIS<30?"clinic-prog-fill low":"clinic-prog-fill";
    html += "<div class=\"clinic-prog-row\">";
    html += "<div class=\"clinic-prog-info\">";
    html += "<span class=\"clinic-prog-name\" style=\"font-size:.72rem;color:#C0440F\">\uD83C\uDF00 Salas IS</span>";
    html += "<span class=\"clinic-prog-nums\">" + feitasIS + "/" + is.length + "</span>";
    html += "</div>";
    html += "<div class=\"clinic-prog-bar\" style=\"height:4px\">";
    html += "<div class=\"" + fillIS + "\" style=\"width:" + pctIS + "%;background:#FF6B35\"></div>";
    html += "</div></div>";
  }
  wrap.innerHTML = html;
}
function buildRooms() {
  if (!CLINIC) return;
  var g = document.getElementById("roomsGrid"), html = "";
  for (var i=0; i<CLINIC.rooms.length; i++) {
    var r = CLINIC.rooms[i];
    var k = rk(CLINIC.id, r.id);
    var d = doneInfo(k);
    var isIS = r.type === "IS";
    var nm = r.n.replace(/ \uD83C\uDF00[\s\S]*$/, "").trim();
    var byO = d && d.who && d.who !== WHO;
    var isToday = d && d.date === today();
    var badgeTxt = isToday ? (byO ? "\uD83D\uDC65 "+d.who.split(" ")[0]+" " : "\u2713 ") + d.time : "";
    var badge = badgeTxt ? "<div class=\"dbadge\">" + badgeTxt + "</div>" : "";
    html += "<button class=\"rbtn"+(isIS?" is-r":"")+(d?" done":"")+" \" onclick=\"pickRoom('"+r.id+"')\">";
    html += badge + "<div class=\"rn\">"+nm+"</div><div class=\"rt\">"+(isIS?"\uD83C\uDF00 IS":"Padr\u00e3o")+"</div></button>";
  }
  g.innerHTML = html;
}
function pickRoom(id) {
  for (var i=0;i<CLINIC.rooms.length;i++) { if(CLINIC.rooms[i].id===id){ROOM=CLINIC.rooms[i];break;} }
  goS3();
}

  var items = ROOM.type==="IS" ? ITEMS_IS : ITEMS_PADRAO;
  var filtered = [];
  for (var i=0; i<items.length; i++) {
    var st = gc(items[i].id);
    if (FILTER==="ok" && st!=="ok") continue;
    if (FILTER==="nok" && st!=="nok") continue;
    if (FILTER==="pend" && st) continue;
    filtered.push(items[i]);
  }
  var body = document.getElementById("ckBody");
  if (!filtered.length) { body.innerHTML="<div class=\"empty\"><div class=\"empty-ico\">\uD83D\uDD0D</div><p>Nenhum item nesta visualiza\u00e7\u00e3o</p></div>"; return; }
  var groups = {}, gorder = [];
  for (var i=0; i<filtered.length; i++) {
    var s = filtered[i].sub;
    if (!groups[s]) { groups[s]=[]; gorder.push(s); }
    groups[s].push(filtered[i]);
  }
  var html = "";
  for (var gi=0; gi<gorder.length; gi++) {
    var sub = gorder[gi];
    html += "<div class=\"glbl\">"+sub+"</div>";
    var grp = groups[sub];
    for (var i=0; i<grp.length; i++) {
      var item = grp[i];
      var st = gc(item.id);
      var cc = st==="ok"?"c-ok":st==="nok"?"c-nok":"";
      var okS = st==="ok"?"sel":"", nokS = st==="nok"?"sel":"";
      var link = item.link && item.link.indexOf("encomenda")<0
        ? "<a class=\"ilink\" href=\""+item.link+"\" target=\"_blank\">\uD83D\uDED2 Ver produto</a>" : "";
      html += "<div class=\"icard "+cc+"\">";
      html += "<div class=\"imain\">";
      html += "<div class=\"ithumb\"><div class=\"emoji\" id=\"ph_"+item.id+"\">"+item.emoji+"</div><img id=\"img_"+item.id+"\" alt=\""+item.nome+"\"></div>";
      html += "<div class=\"ibody\"><div class=\"iname\">"+item.nome+"</div>";
      html += "<div class=\"imeta\"><span class=\"iqty\">\uD83D\uDCE6 "+item.qty+"</span><span class=\"icat\">"+item.cat+"</span></div>";
      html += "<div class=\"iid\">"+item.id+"</div></div>";
      html += "<div class=\"iacts\">";
      html += "<button class=\"iact ok "+okS+"\" onclick=\"sc('"+item.id+"','ok')\">\u2713</button>";
      html += "<button class=\"iact nok "+nokS+"\" onclick=\"sc('"+item.id+"','nok')\">\u2717</button>";
      var noteVal = gn(item.id);
      var noteWrapCls = st==="ok" ? "inote-wrap ok-note" : "inote-wrap";
      var noteBlock = st ? (
        "<div class=\"" + noteWrapCls + "\">" +
        "<label class=\"inote-label\">" + (st==="nok" ? "\uD83D\uDCDD Observação (ex: só tem 2, está quebrado...)" : "\uD83D\uDCDD Observação opcional") + "</label>" +
        "<textarea class=\"inote-input\" rows=\"2\" oninput=\"sn('" + item.id + "',this.value)\" placeholder=\"Deixe em branco se não houver obs...\">" + noteVal + "</textarea>" +
        "</div>"
      ) : "";
      html += "</div></div>" + noteBlock + link + "</div>";
    }
  }
  // Obs da sala no final
  var obsVal = getRoomObs();
  html += "<div class=\"sala-obs\">" +
    "<div class=\"sala-obs-lbl\">\uD83D\uDCCB Observação geral da sala</div>" +
    "<textarea class=\"sala-obs-ta\" placeholder=\"Ex: falta prateleira, sala com goteira, itens no almoxarifado...\" oninput=\"setRoomObs(this.value);save()\">" + obsVal + "</textarea>" +
    "</div>";
  body.innerHTML = html;
  for (var i=0; i<filtered.length; i++) {
    loadImg(filtered[i], document.getElementById("img_"+filtered[i].id), document.getElementById("ph_"+filtered[i].id));
  }
}

// ── STATS ────────────────────────────────────────────────
function updateStats() {
  if (!ROOM) return;
  var items = ROOM.type==="IS" ? ITEMS_IS : ITEMS_PADRAO;
  var ok=0, nok=0;
  for (var i=0;i<items.length;i++) { var s=gc(items[i].id); if(s==="ok") ok++; if(s==="nok") nok++; }
  var total=items.length, done=ok+nok, pct=total>0?Math.round(done/total*100):0;
  document.getElementById("stN").textContent   = total;
  document.getElementById("stOk").textContent  = ok;
  document.getElementById("stNok").textContent = nok;
  document.getElementById("pFill").style.width = pct+"%";
  document.getElementById("pPct").textContent  = pct+"%";
  var btn=document.getElementById("btnSend"), k=rk(CLINIC.id,ROOM.id), d=doneInfo(k);
  if (d) {
    btn.className="bsend sent"; btn.textContent="\u2705 Enviado "+d.time; btn.disabled=false;
  } else if (done===0) {
    btn.className="bsend"; btn.textContent="\uD83D\uDCE4 Enviar"; btn.disabled=true;
  } else {
    btn.className="bsend"; btn.textContent="\uD83D\uDCE4 Enviar ("+done+"/"+total+")"; btn.disabled=false;
  }
}

// ── RESET ────────────────────────────────────────────────
function resetRoom() {
  var nm = ROOM.n.split("\uD83C\uDF00")[0].split("\uD83D\uDC65")[0].trim();
  if (!confirm("Limpar checklist da "+nm+"?")) return;
  var items = ROOM.type==="IS"?ITEMS_IS:ITEMS_PADRAO;
  for(var i=0;i<items.length;i++) { delete checks[sk(CLINIC.id,ROOM.id,items[i].id)]; delete notes[sk(CLINIC.id,ROOM.id,items[i].id)]; }
  var k=rk(CLINIC.id,ROOM.id); delete sent[k]; delete shared[k]; delete roomObs[k];
  save(); renderCk(); updateStats();
  if(CLINIC) buildRooms();
}

// ── SYNC ────────────────────────────────────────────────
async function fetchShared() {
  if (!APPS_URL) return;
  try {
    // Busca sem filtro de data para pegar histórico completo
    var url = APPS_URL + "?action=status";
    var r = await fetch(url, {signal: AbortSignal.timeout(6000)});
    if (!r.ok) return;
    var d = await r.json();
    if (d.rooms) {
      shared = d.rooms;
      // local tem prioridade
      for (var k in sent) { shared[k] = sent[k]; }
      // Calcular última ronda por clínica
      lastRonda = {};
      for (var k in shared) {
        var parts = k.split('_'); // clinicId_roomId
        var cid = parts[0];
        var entry = shared[k];
        if (!lastRonda[cid] || entry.date > lastRonda[cid].date ||
           (entry.date === lastRonda[cid].date && entry.time > lastRonda[cid].time)) {
          lastRonda[cid] = entry;
        }
      }
    }
  } catch(e) {}
}
async function refreshRooms() {
  var btn=document.getElementById("btnRefresh");
  if(btn){btn.textContent="\u23F3";btn.disabled=true;}
  await fetchShared();
  buildRooms();
  if(btn){btn.textContent="\uD83D\uDD04 Atualizar";btn.disabled=false;}
  toast("Status atualizado!");
}

// ── ENVIO ────────────────────────────────────────────────
async function enviar() {
  var k = rk(CLINIC.id, ROOM.id);
  var items = ROOM.type==="IS"?ITEMS_IS:ITEMS_PADRAO;
  var rows = [];
  for (var i=0;i<items.length;i++) {
    var st = gc(items[i].id);
    if (!st) continue;
    rows.push({
      responsavel: WHO, clinica: CLINIC.name,
      sala: ROOM.n.replace(/ \uD83C\uDF00[\s\S]*$/, "").trim(),
      tipoSala: ROOM.type==="IS"?"Integra\u00e7\u00e3o Sensorial":"Sala Padr\u00e3o",
      itemId: items[i].id, itemNome: items[i].nome,
      subcategoria: items[i].sub, quantidade: items[i].qty,
      status: st, categoria: items[i].cat,
      observacao: notes[sk(CLINIC.id, ROOM.id, items[i].id)] || "" 
    });
  }
  if (!rows.length) { toast("Nenhum item verificado ainda"); return; }
  var btn = document.getElementById("btnSend");
  var now = new Date();
  var time = now.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
  btn.className="bsend sending"; btn.textContent="\u23F3 Enviando..."; btn.disabled=true;
  try {
    var obsGeral = getRoomObs();
    var payload = JSON.stringify({rows:rows, rondaKey:k, time:time, who:WHO, date:today(), obsSala:obsGeral});
    var url = APPS_URL + "?action=post&data=" + encodeURIComponent(payload);
    var r = await fetch(url, {signal: AbortSignal.timeout(20000)});
    var res = await r.json().catch(function(){return{success:true};});
    if (res.error) throw new Error(res.error);
    sent[k]={date:today(),time:time,who:WHO}; shared[k]=sent[k];
    save();
    btn.className="bsend sent"; btn.textContent="\u2705 Enviado "+time;
    toast("\u2705 "+rows.length+" itens enviados para a planilha!");
    buildRooms();
    buildClinicProgress();
  } catch(e) {
    btn.className="bsend"; btn.textContent="Tentar novamente"; btn.disabled=false;
    toast("Erro: "+(e.message||"verifique a conex\u00e3o"));
  }
}

// ── TOAST ────────────────────────────────────────────────
function toast(msg) {
  var t=document.getElementById("toast");
  t.textContent=msg; t.classList.add("show");
  setTimeout(function(){t.classList.remove("show");},3000);
}
