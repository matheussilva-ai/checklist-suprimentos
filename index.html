<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1A2332">
<title>Checklist de Estoque – Genial Care</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --teal: #00B4A2; --teal-dk: #008F80; --teal-lt: #E6F8F6;
  --orange: #FF6B35; --dark: #1A2332; --mid: #3D5166; --light: #8499AE;
  --bg: #F4F7F9; --white: #FFFFFF;
  --ok: #2ECC71; --ok-bg: #E8FAF0; --ok-dk: #1A7340;
  --nok: #E74C3C; --nok-bg: #FDECEA; --nok-dk: #C0392B;
  --r: 14px; --shadow: 0 2px 16px rgba(0,0,0,0.07);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: "DM Sans", sans-serif; background: var(--bg); color: var(--dark); min-height: 100vh; overscroll-behavior: none; }

/* ── SCREENS ── */
.screen { display: none; flex-direction: column; min-height: 100vh; }
.screen.active { display: flex; }

/* ── HEADER ── */
header {
  background: var(--dark); padding: 14px 20px;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 20px rgba(0,0,0,0.2);
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
}
.logo img { height: 28px; width: auto; display: block; }
.header-right { display: flex; align-items: center; gap: 10px; }
.progress-wrap { display: flex; align-items: center; gap: 6px; }
.progress-bar { width: 70px; height: 5px; background: rgba(255,255,255,0.12); border-radius: 99px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--teal); border-radius: 99px; transition: width .4s; }
.progress-pct { font-size: 0.72rem; color: var(--light); }
.who-chip {
  background: rgba(0,180,162,0.15); border: 1px solid rgba(0,180,162,0.3);
  border-radius: 99px; padding: 4px 10px; font-size: 0.72rem; color: var(--teal); font-weight: 500;
  white-space: nowrap; max-width: 100px; overflow: hidden; text-overflow: ellipsis;
}

/* ── WELCOME SCREEN ── */
.welcome-body {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 32px 24px; gap: 32px;
}
.welcome-logo { text-align: center; }
.welcome-logo img { height: 48px; }
.welcome-title { font-family: "Syne", sans-serif; font-size: 1.3rem; font-weight: 700; color: var(--dark); text-align: center; }
.welcome-sub { font-size: 0.85rem; color: var(--light); text-align: center; margin-top: 4px; }
.who-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; max-width: 360px; }
.who-btn {
  background: var(--white); border: 2px solid #DDE4EA; border-radius: var(--r);
  padding: 16px 12px; text-align: center; cursor: pointer;
  font-family: "Syne", sans-serif; font-weight: 600; font-size: 0.9rem;
  color: var(--mid); transition: all .18s; box-shadow: var(--shadow);
}
.who-btn:active, .who-btn.selected {
  background: var(--dark); color: var(--white); border-color: var(--dark);
}
.who-btn .who-initial {
  width: 44px; height: 44px; border-radius: 50%;
  background: var(--bg); margin: 0 auto 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.2rem; font-weight: 800; color: var(--teal);
  font-family: "Syne", sans-serif;
}
.who-btn.selected .who-initial { background: rgba(0,180,162,0.2); }
.start-btn {
  width: 100%; max-width: 360px;
  background: var(--teal); color: white; border: none; border-radius: var(--r);
  padding: 16px; font-size: 1rem; font-weight: 600; font-family: "Syne", sans-serif;
  cursor: pointer; transition: background .2s; box-shadow: 0 4px 16px rgba(0,180,162,0.3);
}
.start-btn:disabled { background: #B0C4CC; box-shadow: none; }

/* ── SELECTOR SCREEN ── */
.selector-body { flex: 1; padding: 20px; display: flex; flex-direction: column; gap: 16px; overflow-y: auto; }
.section-label { font-family: "Syne", sans-serif; font-weight: 700; font-size: 0.7rem; color: var(--light); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 8px; }
.clinics-grid { display: flex; flex-direction: column; gap: 8px; }
.clinic-btn {
  background: var(--white); border: 2px solid #DDE4EA; border-radius: var(--r);
  padding: 14px 16px; cursor: pointer; transition: all .15s;
  display: flex; align-items: center; gap: 12px; box-shadow: var(--shadow);
}
.clinic-btn .clinic-icon { font-size: 1.4rem; flex-shrink: 0; }
.clinic-btn .clinic-info { flex: 1; }
.clinic-btn .clinic-name { font-family: "Syne", sans-serif; font-weight: 600; font-size: 0.9rem; color: var(--dark); }
.clinic-btn .clinic-stats { font-size: 0.72rem; color: var(--light); margin-top: 2px; }
.clinic-btn .clinic-arrow { color: var(--light); font-size: 1rem; }
.clinic-btn.selected { border-color: var(--teal); background: var(--teal-lt); }
.rooms-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.room-btn {
  background: var(--white); border: 2px solid #DDE4EA; border-radius: 10px;
  padding: 12px 6px; cursor: pointer; text-align: center;
  transition: all .15s; box-shadow: var(--shadow);
  position: relative;
}
.room-btn .room-num { font-family: "Syne", sans-serif; font-weight: 700; font-size: 0.85rem; color: var(--dark); }
.room-btn .room-type { font-size: 0.62rem; color: var(--light); margin-top: 2px; }
.room-btn.is-room { border-color: #FFD0BC; background: #FFF5F0; }
.room-btn.is-room .room-num { color: #C0440F; }
.room-btn.done-today { border-color: var(--ok); background: var(--ok-bg); }
.room-btn.done-today .room-num { color: var(--ok-dk); }
.done-badge {
  position: absolute; top: -6px; right: -6px;
  background: var(--ok); color: white; border-radius: 99px;
  font-size: 0.55rem; font-weight: 700; padding: 2px 5px; white-space: nowrap;
}

/* ── CHECKLIST SCREEN ── */
.checklist-header {
  background: var(--dark); padding: 10px 20px 14px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.room-banner {
  display: flex; align-items: center; gap: 10px; margin-top: 10px;
  padding: 10px 14px; border-radius: 10px;
}
.room-banner.padrao { background: rgba(0,180,162,0.12); }
.room-banner.is     { background: rgba(255,107,53,0.12); }
.room-banner .rb-icon { font-size: 1.3rem; }
.room-banner .rb-title { font-family: "Syne", sans-serif; font-weight: 700; font-size: 0.85rem; color: white; }
.room-banner .rb-sub { font-size: 0.7rem; color: var(--light); }
.filter-tabs { display: flex; gap: 6px; padding: 12px 20px 0; overflow-x: auto; scrollbar-width: none; }
.filter-tabs::-webkit-scrollbar { display: none; }
.ftab {
  flex-shrink: 0; padding: 6px 14px; border-radius: 99px; font-size: 0.75rem; font-weight: 500;
  border: 1.5px solid #DDE4EA; cursor: pointer; background: var(--white); color: var(--mid); transition: all .15s;
}
.ftab.active { background: var(--dark); color: white; border-color: var(--dark); }
.ftab.f-ok.active { background: var(--ok); border-color: var(--ok); }
.ftab.f-nok.active { background: var(--nok); border-color: var(--nok); }
.checklist-body { flex: 1; padding: 12px 16px 140px; display: flex; flex-direction: column; gap: 8px; overflow-y: auto; }
.sec-label { font-family: "Syne", sans-serif; font-weight: 700; font-size: 0.68rem; color: var(--light); text-transform: uppercase; letter-spacing: .08em; padding: 4px 0 2px; }
.item-card {
  background: var(--white); border-radius: var(--r); box-shadow: var(--shadow);
  overflow: hidden; border: 2px solid transparent; transition: border-color .15s, background .15s;
}
.item-card.c-ok  { border-color: var(--ok);  background: var(--ok-bg); }
.item-card.c-nok { border-color: var(--nok); background: var(--nok-bg); }
.item-main { display: flex; align-items: stretch; min-height: 88px; }
.item-thumb {
  width: 80px; min-width: 80px; background: #F0F4F8;
  display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden;
}
.item-thumb .t-emoji { font-size: 2rem; }
.item-thumb img {
  display: none; position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover;
  opacity: 0; transition: opacity .3s;
}
.item-thumb img.show { display: block; opacity: 1; }
.item-body { flex: 1; padding: 11px 12px; display: flex; flex-direction: column; justify-content: center; gap: 4px; }
.item-name { font-family: "Syne", sans-serif; font-weight: 600; font-size: 0.88rem; line-height: 1.3; color: var(--dark); }
.item-meta { display: flex; flex-wrap: wrap; gap: 5px; align-items: center; }
.item-qty { font-size: 0.7rem; color: var(--teal-dk); font-weight: 500; background: var(--teal-lt); padding: 2px 7px; border-radius: 99px; }
.item-badge { font-size: 0.68rem; color: var(--mid); background: var(--bg); padding: 2px 7px; border-radius: 99px; }
.item-id { font-size: 0.65rem; color: var(--light); }
.item-actions { display: flex; flex-direction: column; width: 72px; min-width: 72px; border-left: 1px solid #F0F4F7; }
.iact {
  flex: 1; border: none; cursor: pointer; font-size: 1.5rem; font-weight: 700;
  display: flex; align-items: center; justify-content: center; background: transparent; transition: background .12s;
  min-height: 44px;
}
.iact.ok  { color: var(--ok); }
.iact.nok { color: var(--nok); border-top: 1px solid #F0F4F7; }
.iact.ok.sel  { background: var(--ok);  color: white; }
.iact.nok.sel { background: var(--nok); color: white; }
.item-link {
  display: block; text-align: center; padding: 7px;
  font-size: 0.68rem; color: var(--teal); background: var(--teal-lt);
  text-decoration: none; font-weight: 500; border-top: 1px solid #D0F0EC;
}

/* ── BOTTOM BAR ── */
.bottom-bar {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 99;
  background: var(--white); border-top: 1px solid #E8EDF2;
  box-shadow: 0 -4px 20px rgba(0,0,0,0.08);
}
.stats-row { display: flex; gap: 0; border-bottom: 1px solid #F0F4F7; }
.stat-box { flex: 1; padding: 8px 4px; text-align: center; }
.stat-box:not(:last-child) { border-right: 1px solid #F0F4F7; }
.stat-num { font-family: "Syne", sans-serif; font-weight: 800; font-size: 1.3rem; }
.stat-box.s-ok .stat-num  { color: var(--ok); }
.stat-box.s-nok .stat-num { color: var(--nok); }
.stat-lbl { font-size: 0.6rem; color: var(--light); font-weight: 500; text-transform: uppercase; letter-spacing: .04em; }
.action-row { display: flex; gap: 8px; padding: 10px 16px; }
.btn-send {
  flex: 1; background: var(--teal); color: white; border: none; border-radius: 10px;
  padding: 13px; font-size: 0.88rem; font-weight: 600; font-family: "Syne", sans-serif;
  cursor: pointer; transition: background .2s; display: flex; align-items: center; justify-content: center; gap: 6px;
}
.btn-send:disabled { background: #B0C4CC; }
.btn-send.sending { background: #F39C12; }
.btn-send.sent    { background: var(--ok-dk); }
.btn-reset {
  background: var(--bg); border: 1.5px solid #DDE4EA; border-radius: 10px;
  padding: 13px 14px; font-size: 0.8rem; color: var(--mid); cursor: pointer; font-weight: 500;
}
.btn-back {
  background: var(--bg); border: 1.5px solid #DDE4EA; border-radius: 10px;
  padding: 13px 14px; font-size: 0.8rem; color: var(--mid); cursor: pointer; font-weight: 500;
}

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 130px; left: 50%; transform: translateX(-50%);
  background: var(--dark); color: white; border-radius: 99px;
  padding: 10px 20px; font-size: 0.82rem; font-weight: 500;
  box-shadow: 0 4px 20px rgba(0,0,0,0.25); z-index: 999;
  opacity: 0; transition: opacity .3s; pointer-events: none; white-space: nowrap;
}
.toast.show { opacity: 1; }

/* ── EMPTY STATE ── */
.empty-state { text-align: center; padding: 48px 20px; color: var(--light); }
.empty-icon { font-size: 2.5rem; margin-bottom: 10px; }

@media (max-width: 380px) {
  .who-grid { grid-template-columns: 1fr 1fr; }
  .rooms-grid { grid-template-columns: repeat(3, 1fr); }
  .item-thumb { width: 68px; min-width: 68px; }
}
</style>
</head>

// ════════════════════ IMAGENS ════════════════════
const IMG_CACHE = {};
function extractMlbId(url) {
  if (!url) return null;
  const m = url.match(/MLB[-]?(\d{7,12})/i);
  return m ? `MLB${m[1]}` : null;
}
async function loadImg(item, imgEl, phEl) {
  if (!imgEl) return;
  const cached = IMG_CACHE[item.id];
  if (cached === 'error') return;
  if (cached) { applyImg(imgEl, phEl, cached); return; }
  const url = item.link;
  if (!url || url.includes('encomenda')) return;
  const mlbId = extractMlbId(url);
  if (mlbId) {
    try {
      const res = await fetch(`https://api.mercadolibre.com/items/${mlbId}?attributes=thumbnail`, {signal: AbortSignal.timeout(6000)});
      if (res.ok) {
        const data = await res.json();
        let src = (data.thumbnail || '').replace(/-[A-Z]\.jpg/, '-O.jpg').replace('http://', 'https://');
        if (src) { IMG_CACHE[item.id] = src; applyImg(imgEl, phEl, src); return; }
      }
    } catch(e) {}
  }
  if (!mlbId && url && !url.includes('issam')) {
    try {
      const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`, {signal: AbortSignal.timeout(8000)});
      if (res.ok) {
        const d = await res.json();
        const m = d.contents.match(/(?:og:image|twitter:image)[^>]*content=["']([^"']+)["']|content=["']([^"']+)["'][^>]*(?:og:image|twitter:image)/i);
        const src = m && (m[1]||m[2]);
        if (src) { IMG_CACHE[item.id] = src; applyImg(imgEl, phEl, src); return; }
      }
    } catch(e) {}
  }
  IMG_CACHE[item.id] = 'error';
}
function applyImg(imgEl, phEl, src) {
  imgEl.src = src; imgEl.style.display = 'block';
  imgEl.onload  = () => { imgEl.classList.add('show'); if(phEl) phEl.style.display='none'; };
  imgEl.onerror = () => { imgEl.style.display='none'; };
}

let currentWho = null;
let currentClinic = null;
let currentRoom = null;
let currentFilter = 'all';
let checks = {};      // clinicId_roomId_itemId → 'ok'|'nok'
let sentRooms = {};   // clinicId_roomId → {time, date}

function stKey(cId, rId, iId) { return `${cId}_${rId}_${iId}`; }
function roomKey(cId, rId)    { return `${cId}_${rId}`; }
function todayStr() { return new Date().toLocaleDateString('pt-BR'); }

function getCheck(iId)         { return checks[stKey(currentClinic.id, currentRoom.id, iId)] || null; }
function setCheckVal(iId, val) {
  const k = stKey(currentClinic.id, currentRoom.id, iId);
  if (checks[k] === val) delete checks[k]; else checks[k] = val;
  save(); renderChecklist(); updateStats();
}

function save() {
  try { localStorage.setItem('gc_checks', JSON.stringify(checks)); } catch(e){}
  try { localStorage.setItem('gc_sent', JSON.stringify(sentRooms)); } catch(e){}
}
function load() {
  try { const d=localStorage.getItem('gc_checks'); if(d) checks=JSON.parse(d); } catch(e){}
  try { const d=localStorage.getItem('gc_sent');   if(d) sentRooms=JSON.parse(d); } catch(e){}
}

function buildClinicsGrid() {
  const grid = document.getElementById('clinicsGrid');
  const ORDER = ['morumbi16','morumbi12','morumbi14','tatuape','pinheiros','paraiso','alphaville3','alphaville9','analia','santana'];
  grid.innerHTML = ORDER.map(id => {
    const c = CLINICS.find(x=>x.id===id); if(!c) return '';
    const isRooms = c.rooms.filter(r=>r.type==='IS').length;
    const padRooms = c.rooms.length - isRooms;
    return `<button class="clinic-btn" onclick="selectClinic(this,'${c.id}')" id="cbtn_${c.id}">
      <div class="clinic-icon">🏥</div>
      <div class="clinic-info">
        <div class="clinic-name">${c.name}</div>
        <div class="clinic-stats">${padRooms} padrão · ${isRooms} IS</div>
      </div>
      <div class="clinic-arrow">›</div>
    </button>`;
  }).join('');
}
function selectClinic(btn, clinicId) {
  document.querySelectorAll('.clinic-btn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
  currentClinic = CLINICS.find(c=>c.id===clinicId);
  buildRoomsGrid();
  document.getElementById('roomsSection').style.display = 'block';
  document.getElementById('roomsSectionLabel').textContent = `Salas – ${currentClinic.name}`;
  setTimeout(()=>document.getElementById('roomsSection').scrollIntoView({behavior:'smooth'}), 100);
}
function buildRoomsGrid() {
  const grid = document.getElementById('roomsGrid');
  grid.innerHTML = currentClinic.rooms.map(r => {
    const rk = roomKey(currentClinic.id, r.id);
    const done = roomDoneInfo(rk);
    const isIS = r.type === 'IS';
    const name = r.n.replace(/ 🌀 IS/,'').replace(/ 🌀.*$/,'');
    const byOther = done && done.who && done.who !== currentWho;
    const badgeLabel = done ? (byOther ? `👤 ${done.who?.split(' ')[0]} ${done.time}` : `✓ ${done.time}`) : '';
    return `<button class="room-btn ${isIS?'is-room':''} ${done?'done-today':''}"
      onclick="selectRoom('${r.id}')">
      ${done ? `<div class="done-badge">${badgeLabel}</div>` : ''}
      <div class="room-num">${name}</div>
      <div class="room-type">${isIS?'🌀 IS':'Padrão'}</div>
    </button>`;
  }).join('');
}
function selectRoom(roomId) {
  currentRoom = currentClinic.rooms.find(r=>r.id===roomId);
  goToChecklist();
}

// ════════════════════ CHECKLIST RENDER ════════════════════
function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.ftab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  renderChecklist();
}
function renderChecklist() {
  if (!currentRoom) return;
  const items = currentRoom.type==='IS' ? ITEMS_IS : ITEMS_PADRAO;
  const filtered = items.filter(item => {
    const st = getCheck(item.id);
    if (currentFilter==='ok')   return st==='ok';
    if (currentFilter==='nok')  return st==='nok';
    if (currentFilter==='pend') return !st;
    return true;
  });
  const body = document.getElementById('checklistBody');
  if (!filtered.length) {
    body.innerHTML = `<div class="empty-state"><div class="empty-icon">🔍</div><p>Nenhum item nesta visualização</p></div>`;
    return;
  }
  const groups = {};
  filtered.forEach(i => { if(!groups[i.sub]) groups[i.sub]=[]; groups[i.sub].push(i); });
  let html = '';
  Object.entries(groups).forEach(([sub, grp]) => {
    html += `<div class="sec-label">${sub}</div>`;
    grp.forEach(item => {
      const st = getCheck(item.id);
      html += `
        <div class="item-card ${st==='ok'?'c-ok':''} ${st==='nok'?'c-nok':''}" id="card_${item.id}">
          <div class="item-main">
            <div class="item-thumb">
              <div class="t-emoji" id="ph_${item.id}">${item.emoji}</div>
              <img id="img_${item.id}" alt="${item.nome}">
            </div>
            <div class="item-body">
              <div class="item-name">${item.nome}</div>
              <div class="item-meta">
                <span class="item-qty">📦 ${item.qty}</span>
                <span class="item-badge">${item.cat}</span>
              </div>
              <div class="item-id">${item.id}</div>
            </div>
            <div class="item-actions">
              <button class="iact ok ${st==='ok'?'sel':'''}" onclick="setCheckVal('${item.id}','ok')">✓</button>
              <button class="iact nok ${st==='nok'?'sel':'''}" onclick="setCheckVal('${item.id}','nok')">✗</button>
            </div>
          </div>
          ${item.link&&!item.link.includes('encomenda') ? `<a class="item-link" href="${item.link}" target="_blank" rel="noopener">🛒 Ver produto</a>` : ''}
        </div>`;
    });
  });
  body.innerHTML = html;
  filtered.forEach(item => {
    loadImg(item, document.getElementById(`img_${item.id}`), document.getElementById(`ph_${item.id}`));
  });
}

// ════════════════════ STATS ════════════════════
function updateStats() {
  if (!currentRoom) return;
  const items = currentRoom.type==='IS' ? ITEMS_IS : ITEMS_PADRAO;
  let ok=0, nok=0;
  items.forEach(i => { const s=getCheck(i.id); if(s==='ok') ok++; if(s==='nok') nok++; });
  const total = items.length;
  const done = ok+nok;
  const pct = total>0 ? Math.round(done/total*100) : 0;
  document.getElementById('stTotal').textContent = total;
  document.getElementById('stOk').textContent = ok;
  document.getElementById('stNok').textContent = nok;
  document.getElementById('progFill').style.width = pct+'%';
  document.getElementById('progPct').textContent = pct+'%';
  // Botão enviar
  const btn = document.getElementById('btnSend');
  const rk = roomKey(currentClinic.id, currentRoom.id);
  const _done = roomDoneInfo(rk);
  const alreadySent = !!_done;
  if (alreadySent) {
    btn.className = 'btn-send sent';
    btn.innerHTML = `✅ Enviado às ${_done.time}${_done.who && _done.who !== currentWho ? ' por ' + _done.who.split(' ')[0] : ''}`;
    btn.disabled = false;
  } else if (done === 0) {
    btn.className = 'btn-send'; btn.disabled = true;
    btn.innerHTML = '<span>📤</span> <span>Enviar para planilha</span>';
  } else {
    btn.className = 'btn-send'; btn.disabled = false;
    btn.innerHTML = `<span>📤</span> <span>Enviar (${done}/${total})</span>`;
  }
}
function checkSentStatus() {
  const rk = roomKey(currentClinic.id, currentRoom.id);
  const done = roomDoneInfo(rk);
  if (done) {
    const byOther = done.who && done.who !== currentWho;
    showToast(byOther
      ? `✅ ${done.who.split(' ')[0]} já preencheu esta sala às ${done.time}`
      : `✅ Você já enviou esta sala às ${done.time}`);
  }
}

// ════════════════════ ENVIO ════════════════════
async function sendToSheet() {
  const rk = roomKey(currentClinic.id, currentRoom.id);
  const items = currentRoom.type==='IS' ? ITEMS_IS : ITEMS_PADRAO;
  const rows = items
    .map(item => ({ ...item, status: getCheck(item.id) }))
    .filter(item => item.status)
    .map(item => ({
      responsavel: currentWho,
      clinica: currentClinic.name,
      sala: currentRoom.n.replace(/ 🌀.*$/,''),
      tipoSala: currentRoom.type==='IS' ? 'Integração Sensorial' : 'Sala Padrão',
      itemId: item.id, itemNome: item.nome,
      subcategoria: item.sub, quantidade: item.qty,
      status: item.status, categoria: item.cat
    }));
  if (!rows.length) { showToast('Nenhum item verificado ainda'); return; }
  const btn = document.getElementById('btnSend');
  btn.className = 'btn-send sending'; btn.innerHTML = '⏳ Enviando...'; btn.disabled = true;
  try {
    if (!APPS_SCRIPT_URL || APPS_SCRIPT_URL === '__APPS_SCRIPT_URL__') {
      // Sem URL configurada → simula envio
      await new Promise(r => setTimeout(r, 1200));
    } else {
      await fetch(APPS_SCRIPT_URL, {
        method: 'POST', mode: 'no-cors',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({rows, rondaKey: rk, time, who: currentWho, date: todayStr()})
      });
    }
    const now = new Date();
    const time = now.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    sentRooms[rk] = { date: todayStr(), time, who: currentWho };
    sharedSent[rk] = { date: todayStr(), time, who: currentWho };
    save();
    btn.className = 'btn-send sent'; btn.innerHTML = `✅ Enviado às ${time}`;
    showToast(`✅ ${rows.length} itens enviados para a planilha!`);
    if (currentClinic) buildRoomsGrid();
  } catch(e) {
    btn.className = 'btn-send'; btn.disabled = false;
    btn.innerHTML = '<span>📤</span> <span>Tentar novamente</span>';
    showToast('Erro ao enviar. Verifique a conexão.');
  }
}

// ════════════════════ RESET ════════════════════
function resetRoom() {
  if (!confirm(`Limpar checklist da ${currentRoom.n.replace(/ 🌀.*$/,'')}?`)) return;
  const items = currentRoom.type==='IS' ? ITEMS_IS : ITEMS_PADRAO;
  items.forEach(i => delete checks[stKey(currentClinic.id, currentRoom.id, i.id)]);
  const rk = roomKey(currentClinic.id, currentRoom.id);
  delete sentRooms[rk];
  save(); renderChecklist(); updateStats();
  if(currentClinic) buildRoomsGrid();
}

// ════════════════════ STATUS COMPARTILHADO ════════════════════
let sharedSent = {}; // roomKey → {date, time, who}

async function fetchSharedStatus() {
  if (!APPS_SCRIPT_URL || APPS_SCRIPT_URL === '__APPS_SCRIPT_URL__') return;
  try {
    const url = APPS_SCRIPT_URL + '?action=status&date=' + encodeURIComponent(todayStr());
    const res = await fetch(url, {signal: AbortSignal.timeout(6000)});
    if (!res.ok) return;
    const data = await res.json();
    if (data.rooms) {
      sharedSent = data.rooms;
      // Local tem prioridade se enviado nesta sessão
      Object.entries(sentRooms).forEach(([k,v]) => {
        if (v.date === todayStr()) sharedSent[k] = v;
      });
    }
  } catch(e) {}
}

async function refreshRooms() {
  const btn = document.getElementById('btnRefresh');
  if (btn) { btn.textContent = '⏳'; btn.disabled = true; }
  await fetchSharedStatus();
  if (currentClinic) buildRoomsGrid();
  if (btn) { btn.textContent = '🔄 Atualizar'; btn.disabled = false; }
  showToast('Status atualizado!');
}

function roomDoneInfo(rk) {
  const local = sentRooms[rk];
  if (local && local.date === todayStr()) return local;
  const shared = sharedSent[rk];
  if (shared && shared.date === todayStr()) return shared;
  return null;
}

// ════════════════════ INIT ════════════════════
function init() {
  load();
  buildWhoGrid();
}
init();
</script>
